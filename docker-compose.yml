services:
  db:
    image: pgvector/pgvector:pg16
    container_name: jobmatch-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: jobmatch
      POSTGRES_PASSWORD: jobmatch
      POSTGRES_DB: jobmatch
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U jobmatch"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
